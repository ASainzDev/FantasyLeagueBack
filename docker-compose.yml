services:
  postgres:
    image: postgres:18
    container_name: fantasy_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB:  ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
        - "${DB_PORT}:5432"

    volumes:
        - ./BD/data:/var/lib/postgresql
        - ./BD/ScriptSQL:/docker-entrypoint-initdb.d
